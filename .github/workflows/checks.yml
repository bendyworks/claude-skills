name: checks

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan full history for secrets
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git --no-banner /repo

  identifiers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for personal/client identifiers
        run: bash scripts/check-identifiers.sh

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate marketplace and plugin manifests
        run: claude plugin validate .
